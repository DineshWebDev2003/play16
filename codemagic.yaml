workflows:
  react-native-expo-android:
    name: React Native Expo Android (Debug)
    max_build_duration: 45
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_signing
      node: 20
      java: 17
    working_directory: my-expo-app
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Decode google-services.json
        script: |
          if [ -n "$CM_GOOGLE_SERVICES_JSON" ]; then
            echo "Decoding google-services.json from env var..."
            printf '%s' "$CM_GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          fi
      - name: Expo Prebuild
        script: yes | npx expo prebuild --platform android --clean --no-install
      - name: Write google-services.json (post-prebuild)
        script: |
          if [ -n "$CM_GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$CM_GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          fi
      - name: Build Debug APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
