workflows:
  react-native-expo-android:
    name: React Native Expo Android
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_signing
      node: 20
      java: 17
    working_directory: my-expo-app
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Cleanup
        script: |
          rm -rf android
      - name: Expo Prebuild
        script: yes | npx expo prebuild --platform android --clean --no-install
      - name: Download Keystore
        script: |
          # Try backend first, fall back to env var
          if [ -n "$CM_KEYSTORE_URL" ]; then
            echo "Downloading keystore from backend..."
            curl -sSLf "$CM_KEYSTORE_URL?token=$CM_KEYSTORE_ACCESS_TOKEN" \
              -o /tmp/keystore.keystore || {
              echo "Backend unavailable, falling back to CM_KEYSTORE env var"
              printf '%s' "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.keystore
            }
          else
            echo "Using CM_KEYSTORE env var..."
            printf '%s' "$CM_KEYSTORE" | base64 --decode > /tmp/keystore.keystore
          fi
          ls -la /tmp/keystore.keystore
      - name: Build Android AAB (signed)
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          
          ./gradlew clean bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/keystore.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD \
            --no-daemon --stacktrace

      - name: Build Debug APK
        script: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
