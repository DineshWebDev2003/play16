workflows:
  react-native-expo-android:
    name: Android Debug Build
    max_build_duration: 45
    instance_type: mac_mini_m1
    environment:
      groups:
        - firebase
      node: 20
      java: 17
    working_directory: my-expo-app
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Create google-services.json
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > google-services.json
          if [ ! -s google-services.json ]; then
            echo "ERROR: google-services.json is empty or was not created!"
            exit 1
          fi
      - name: Expo Prebuild
        script: npx expo prebuild --platform android --clean
      - name: Build Android Debug APK
        script: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          cd android
          chmod +x gradlew
          echo "org.gradle.jvmargs=-Xmx4096m" >> gradle.properties
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Get SHA-1 Fingerprints
        script: |
          cd android
          ./gradlew signingReport | grep -E "SHA1|SHA-1" | head -10
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - dineshwebdev2003@gmail.com
