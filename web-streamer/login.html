<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chithode PlaySchool - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 114, 182, 0.05) 0%, transparent 40%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }
    </style>
</head>
<body class="p-4">
    <div class="glass-card w-full max-w-md p-10 shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl -mr-16 -mt-16"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-pink-500/10 rounded-full blur-3xl -ml-16 -mb-16"></div>

        <div class="relative">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-indigo-600/10 rounded-3xl mx-auto flex items-center justify-center mb-6 border border-indigo-500/20">
                    <i class="fas fa-shield-halved text-4xl text-indigo-400"></i>
                </div>
                <h1 class="text-3xl font-black mb-2">Security Hub</h1>
                <p class="text-slate-400 text-sm font-medium tracking-wide uppercase">CCTV Node Authentication</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[3px] text-slate-500 mb-2 ml-1">Access Key</label>
                    <input type="password" id="access-key" 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-6 py-4 text-white placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all font-bold"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center space-x-2 px-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-indigo-600">
                    <label for="remember" class="text-sm text-slate-400 font-medium">Auto-start stream on login</label>
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black uppercase tracking-[3px] text-xs py-5 rounded-2xl transition-all shadow-xl shadow-indigo-500/20 active:scale-95">
                    Authorize Node
                </button>
            </form>

            <p id="error-msg" class="text-red-400 text-xs text-center mt-6 hidden font-bold uppercase tracking-widest leading-relaxed">
                <i class="fas fa-circle-exclamation mr-2"></i> Invalid Access Key
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const key = document.getElementById('access-key').value;
            const errorMsg = document.getElementById('error-msg');

            // Simplistic check for demo - in production this would verify against backend
            if (key === 'chk-admin' || key === '1234') {
                localStorage.setItem('chk_authorized', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
